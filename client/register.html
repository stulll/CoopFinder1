<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoopFinder — Регистрация</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <div class="header-branding">
        <img src="logo.png" alt="Логотип CoopFinder" class="header-logo">
        <a href="index.html" class="logo">CoopFinder</a>
      </div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="profile.html">Профиль</a>
        <a href="players.html">Игроки</a>
        <a href="login.html">Вход</a>
        <a href="register.html" class="nav__active">Регистрация</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section section--gray">
      <div class="container">
        <div class="auth-panel">
          <div>
            <h1>Регистрация</h1>
            <p>Создайте свой аккаунт, чтобы сохранять анкету, создавать лобби и находить команду.</p>
          </div>
          <div class="panel panel--auth">
            <form class="form auth-form" data-form-type="register">
              <label>Имя пользователя</label>
              <input type="text" name="username" placeholder="Введите никнейм" required>
              <label>Email</label>
              <input type="email" name="email" placeholder="Введите Email" required>
              <label>Пароль</label>
              <input type="password" name="password" placeholder="Придумайте пароль" required>
              <button type="submit" class="button">Зарегистрироваться</button>
            </form>
            <p class="auth-note">Уже есть аккаунт? <a href="login.html">Войти</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
